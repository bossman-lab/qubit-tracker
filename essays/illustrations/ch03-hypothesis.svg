<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-label="假设的三个条件">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1536" height="1024" fill="url(#bg)"/>
  <circle cx="768" cy="480" r="300" fill="url(#centerGlow)"/>

  <!-- 三个圆环，代表三个必要条件 -->
  <circle cx="530" cy="420" r="100" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
  <text x="530" y="428" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="18" fill="#f59e0b">压缩</text>

  <circle cx="768" cy="320" r="100" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
  <text x="768" y="328" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="18" fill="#06b6d4">预测</text>

  <circle cx="1006" cy="420" r="100" fill="none" stroke="#f43f5e" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
  <text x="1006" y="428" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="18" fill="#f43f5e">范围</text>

  <!-- 三个圆的交集区域 -->
  <path d="M530 420 A 100 100 0 0 1 768 320 A 100 100 0 0 1 1006 420 A 100 100 0 0 1 768 520 A 100 100 0 0 1 530 420 Z" fill="#f59e0b" opacity="0.05"/>

  <!-- 中心"理解" -->
  <text x="768" y="485" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="24" fill="#fef3c7" filter="url(#glow)">理解</text>

  <text x="768" y="900" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="36" fill="#94a3b8" letter-spacing="4">理解 = 压缩 + 预测 + 范围</text>
  <text x="768" y="940" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="18" fill="#475569" letter-spacing="6">第 三 章 · H1 假 设</text>
</svg>
