<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-label="训练自己的模型">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="modelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="1536" height="1024" fill="url(#bg)"/>

  <!-- 人形轮廓作为"模型" -->
  <ellipse cx="768" cy="480" rx="100" ry="130" fill="url(#modelGrad)" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <circle cx="768" cy="380" r="55" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>

  <!-- 参数点 -->
  <g fill="#f59e0b" opacity="0.4">
    <circle cx="740" cy="370" r="2"/>
    <circle cx="770" cy="360" r="2"/>
    <circle cx="755" cy="385" r="2"/>
    <circle cx="785" cy="375" r="2"/>
    <circle cx="745" cy="395" r="2"/>
    <circle cx="780" cy="400" r="2"/>
    <circle cx="760" cy="410" r="2"/>
  </g>

  <!-- 输入输出箭头 -->
  <path d="M350 450 L500 450" stroke="#475569" stroke-width="1.5" fill="none"/>
  <polygon points="500,445 515,450 500,455" fill="#475569"/>
  <text x="400" y="435" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="14" fill="#475569">训练数据</text>

  <path d="M1036 450 L1186 450" stroke="#06b6d4" stroke-width="1.5" fill="none"/>
  <polygon points="1186,445 1201,450 1186,455" fill="#06b6d4"/>
  <text x="1120" y="435" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="14" fill="#06b6d4">输出</text>

  <!-- 反馈回路 -->
  <path d="M1186 450 C1280 450, 1280 580, 1150 580 C1020 580, 980 580, 860 580" stroke="#f43f5e" stroke-width="0.8" stroke-dasharray="4,3" fill="none" opacity="0.4"/>
  <text x="1150" y="610" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="13" fill="#f43f5e" opacity="0.5">反馈</text>

  <text x="768" y="900" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="36" fill="#94a3b8" letter-spacing="4">训练自己的模型</text>
  <text x="768" y="940" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="18" fill="#475569" letter-spacing="6">第 七 章 · 个 人 成 长</text>
</svg>
