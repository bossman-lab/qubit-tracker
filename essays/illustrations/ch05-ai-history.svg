<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-label="压缩接力赛">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="25%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#f43f5e"/>
      <stop offset="75%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1536" height="1024" fill="url(#bg)"/>

  <!-- 时间线 -->
  <line x1="180" y1="520" x2="1360" y2="520" stroke="#334155" stroke-width="1.5"/>

  <!-- 四个时代节点 -->
  <g filter="url(#glow)">
    <!-- 规则派 1950s -->
    <circle cx="330" cy="520" r="30" fill="#f59e0b" opacity="0.15"/>
    <text x="330" y="528" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="16" fill="#f59e0b">规则</text>
    <text x="330" y="420" text-anchor="middle" font-family="'Noto Serif SC', sans-serif" font-size="14" fill="#475569">1950s</text>
    <!-- 连接向上 -->
    <path d="M330 490 C330 440, 480 440, 480 490" stroke="#f59e0b" stroke-width="0.5" fill="none" opacity="0.3"/>

    <!-- 数据派 1980s -->
    <circle cx="600" cy="520" r="30" fill="#d97706" opacity="0.15"/>
    <text x="600" y="528" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="16" fill="#d97706">数据</text>
    <text x="600" y="420" text-anchor="middle" font-family="'Noto Serif SC', sans-serif" font-size="14" fill="#475569">1986</text>

    <!-- 深度学习 2012 -->
    <circle cx="870" cy="520" r="30" fill="#f43f5e" opacity="0.15"/>
    <text x="870" y="528" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="16" fill="#f43f5e">深度</text>
    <text x="870" y="420" text-anchor="middle" font-family="'Noto Serif SC', sans-serif" font-size="14" fill="#475569">2012</text>

    <!-- LLM 2020s -->
    <circle cx="1140" cy="520" r="30" fill="#06b6d4" opacity="0.15"/>
    <text x="1140" y="528" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="16" fill="#06b6d4">LLM</text>
    <text x="1140" y="420" text-anchor="middle" font-family="'Noto Serif SC', sans-serif" font-size="14" fill="#475569">2022</text>
  </g>

  <!-- 压缩率上升曲线 -->
  <path d="M330 540 C400 480, 500 460, 600 450 C700 440, 800 430, 870 420 C940 410, 1040 390, 1140 370" fill="none" stroke="url(#pathGrad)" stroke-width="2" filter="url(#glow)"/>

  <!-- 上升箭头标注 -->
  <text x="1250" y="360" text-anchor="start" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="16" fill="#f59e0b" opacity="0.6">压缩率 →</text>

  <text x="768" y="900" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="36" fill="#94a3b8" letter-spacing="4">压缩接力赛</text>
  <text x="768" y="940" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="18" fill="#475569" letter-spacing="6">第 五 章 · 七 十 五 年 AI 史</text>
</svg>
