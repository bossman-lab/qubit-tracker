<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-label="终极压缩算法">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="dnaGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1536" height="1024" fill="url(#bg)"/>

  <!-- DNA 螺旋 -->
  <path d="M550 200 C750 280, 750 320, 550 400 C350 480, 350 520, 550 600 C750 680, 750 720, 550 800" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
  <path d="M986 200 C786 280, 786 320, 986 400 C1186 480, 1186 520, 986 600 C786 680, 786 720, 986 800" fill="none" stroke="#f43f5e" stroke-width="2" opacity="0.4" filter="url(#glow)"/>

  <!-- 碱基对 -->
  <g stroke="url(#dnaGrad)" stroke-width="1.5" opacity="0.5">
    <line x1="570" y1="260" x2="962" y2="260"/>
    <line x1="544" y1="340" x2="980" y2="340"/>
    <line x1="544" y1="460" x2="980" y2="460"/>
    <line x1="570" y1="540" x2="962" y2="540"/>
    <line x1="570" y1="660" x2="962" y2="660"/>
    <line x1="544" y1="740" x2="980" y2="740"/>
  </g>

  <!-- 碱基标签 -->
  <text x="510" y="265" font-family="'Georgia', serif" font-size="16" fill="#06b6d4" opacity="0.6">A</text>
  <text x="1005" y="265" font-family="'Georgia', serif" font-size="16" fill="#f43f5e" opacity="0.6">T</text>
  <text x="515" y="345" font-family="'Georgia', serif" font-size="16" fill="#06b6d4" opacity="0.6">G</text>
  <text x="1005" y="345" font-family="'Georgia', serif" font-size="16" fill="#f43f5e" opacity="0.6">C</text>
  <text x="515" y="465" font-family="'Georgia', serif" font-size="16" fill="#06b6d4" opacity="0.6">C</text>
  <text x="1005" y="465" font-family="'Georgia', serif" font-size="16" fill="#f43f5e" opacity="0.6">G</text>

  <!-- 底部：750MB -->
  <rect x="600" y="730" width="336" height="40" rx="6" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.3"/>
  <text x="768" y="757" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="16" fill="#f59e0b" opacity="0.4">30亿碱基对 ≈ 750MB</text>

  <text x="768" y="900" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="36" fill="#94a3b8" letter-spacing="4">终极压缩算法</text>
  <text x="768" y="940" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="18" fill="#475569" letter-spacing="6">第 十 六 章 · 进 化</text>
</svg>
