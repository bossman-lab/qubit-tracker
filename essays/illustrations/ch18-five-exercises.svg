<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-label="五个练习">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1536" height="1024" fill="url(#bg)"/>

  <!-- 五角星/五边形 -->
  <polygon points="768,260 1018,440 900,700 636,700 518,440" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>

  <!-- 五个练习节点 -->
  <g filter="url(#glow)">
    <!-- 输入信噪比 -->
    <circle cx="768" cy="260" r="24" fill="#f59e0b" opacity="0.08"/>
    <text x="768" y="268" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="10" fill="#f59e0b">信噪比</text>

    <!-- 预测日志 -->
    <circle cx="1018" cy="440" r="24" fill="#06b6d4" opacity="0.08"/>
    <text x="1018" y="448" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="10" fill="#06b6d4">预测</text>

    <!-- 学习率 -->
    <circle cx="900" cy="700" r="24" fill="#f43f5e" opacity="0.08"/>
    <text x="900" y="708" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="10" fill="#f43f5e">学习率</text>

    <!-- 跨域迁移 -->
    <circle cx="636" cy="700" r="24" fill="#9333ea" opacity="0.08"/>
    <text x="636" y="708" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="10" fill="#9333ea">跨域</text>

    <!-- 命名仪式 -->
    <circle cx="518" cy="440" r="24" fill="#f59e0b" opacity="0.08"/>
    <text x="518" y="448" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="10" fill="#f59e0b">命名</text>
  </g>

  <!-- 序号 -->
  <text x="760" y="360" text-anchor="middle" font-family="'Georgia', serif" font-size="80" fill="#f59e0b" opacity="0.06" filter="url(#glow)">5</text>

  <text x="768" y="900" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="36" fill="#94a3b8" letter-spacing="4">五个练习</text>
  <text x="768" y="940" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="18" fill="#475569" letter-spacing="6">第 十 八 章</text>
</svg>
