<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-label="悲欢相通是有成本的">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="heartGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bridgeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0"/>
      <stop offset="30%" stop-color="#f43f5e" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1536" height="1024" fill="url(#bg)"/>
  <circle cx="768" cy="400" r="160" fill="url(#heartGlow)"/>

  <!-- 两个分离的形状 -->
  <path d="M460 300 C420 350, 400 420, 430 480 C450 520, 490 530, 520 500 C530 490, 540 470, 550 450" fill="none" stroke="#f43f5e" stroke-width="1.5" opacity="0.5"/>
  <path d="M1076 300 C1116 350, 1136 420, 1106 480 C1086 520, 1046 530, 1016 500 C1006 490, 996 470, 986 450" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>

  <!-- 连接它们的桥——共享训练数据 -->
  <path d="M490 460 C600 490, 700 480, 800 460 C900 440, 970 420, 1040 440" fill="none" stroke="url(#bridgeGrad)" stroke-width="2" filter="url(#glow)"/>

  <!-- 桥上的粒子 -->
  <circle cx="580" cy="475" r="2" fill="#f43f5e" opacity="0.5"/>
  <circle cx="680" cy="470" r="2" fill="#f43f5e" opacity="0.4"/>
  <circle cx="780" cy="462" r="2" fill="#f59e0b" opacity="0.4"/>
  <circle cx="880" cy="450" r="2" fill="#f59e0b" opacity="0.5"/>
  <circle cx="950" cy="445" r="2" fill="#f59e0b" opacity="0.3"/>

  <!-- 底部"成本"刻度 -->
  <rect x="530" y="600" width="476" height="6" rx="3" fill="#475569" opacity="0.4"/>
  <rect x="530" y="600" width="200" height="6" rx="3" fill="#f43f5e" opacity="0.4"/>
  <text x="630" y="635" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="13" fill="#f43f5e" opacity="0.4">高成本</text>
  <text x="900" y="635" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="13" fill="#f59e0b" opacity="0.4">低成本</text>

  <text x="768" y="900" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="36" fill="#94a3b8" letter-spacing="4">悲欢相通是有成本的</text>
  <text x="768" y="940" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="18" fill="#475569" letter-spacing="6">第 十 四 章 · 人 际 沟 通</text>
</svg>
