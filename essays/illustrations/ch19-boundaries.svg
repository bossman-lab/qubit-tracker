<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-label="压缩的边界">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1536" height="1024" fill="url(#bg)"/>

  <!-- 边界圆环 -->
  <circle cx="768" cy="450" r="280" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.15"/>
  <circle cx="768" cy="450" r="200" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.2"/>
  <circle cx="768" cy="450" r="120" fill="url(#innerGlow)" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>

  <!-- 内部：压缩能解释的 -->
  <text x="768" y="420" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="18" fill="#f59e0b" opacity="0.6">可压缩的</text>
  <text x="768" y="460" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="14" fill="#f59e0b" opacity="0.3">框架之内</text>

  <!-- 边界上的四个问号 -->
  <text x="768" y="152" text-anchor="middle" font-family="'Georgia', serif" font-size="28" fill="#64748b" opacity="0.4">zip?</text>
  <text x="1068" y="310" text-anchor="middle" font-family="'Georgia', serif" font-size="28" fill="#64748b" opacity="0.4">肌肉记忆?</text>
  <text x="1068" y="570" text-anchor="middle" font-family="'Georgia', serif" font-size="28" fill="#64748b" opacity="0.4">具身认知?</text>
  <text x="468" y="450" text-anchor="middle" font-family="'Georgia', serif" font-size="28" fill="#64748b" opacity="0.4">品味?</text>

  <text x="768" y="900" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="36" fill="#94a3b8" letter-spacing="4">压缩的边界</text>
  <text x="768" y="940" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="18" fill="#475569" letter-spacing="6">第 十 九 章</text>
</svg>
