<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-label="为什么不压缩">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="pageGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1536" height="1024" fill="url(#bg)"/>

  <!-- 法律文件堆叠 -->
  <rect x="530" y="260" width="476" height="540" rx="6" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.25"/>
  <rect x="540" y="270" width="456" height="520" rx="4" fill="url(#pageGlow)" stroke="#f59e0b" stroke-width="0.5" opacity="0.2"/>

  <!-- 文字行 -->
  <g stroke="#475569" stroke-width="1" opacity="0.3">
    <line x1="580" y1="320" x2="956" y2="320"/>
    <line x1="580" y1="345" x2="920" y2="345"/>
    <line x1="580" y1="370" x2="940" y2="370"/>
    <line x1="580" y1="395" x2="890" y2="395"/>
    <line x1="580" y1="420" x2="960" y2="420"/>
    <line x1="580" y1="445" x2="910" y2="445"/>
    <line x1="580" y1="470" x2="930" y2="470"/>
    <line x1="580" y1="495" x2="870" y2="495"/>
    <line x1="580" y1="520" x2="950" y2="520"/>
    <line x1="580" y1="545" x2="900" y2="545"/>
  </g>

  <!-- 关键词发光 -->
  <text x="580" y="600" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="14" fill="#f43f5e" opacity="0.5">包括但不限于    以下简称    在前述条件下    即</text>

  <!-- 天平符号 -->
  <g transform="translate(768, 740)" opacity="0.2">
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#f59e0b" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="0" cy="-32" r="3" fill="#f59e0b"/>
    <path d="M-35 0 L-60 20 L-30 20 Z" fill="none" stroke="#f59e0b" stroke-width="1"/>
    <path d="M35 0 L60 20 L30 20 Z" fill="none" stroke="#f59e0b" stroke-width="1"/>
  </g>

  <text x="768" y="900" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="36" fill="#94a3b8" letter-spacing="4">为什么不压缩</text>
  <text x="768" y="940" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="18" fill="#475569" letter-spacing="6">第 十 章 · 法 律</text>
</svg>
