<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-label="理解是什么意思">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="unknown" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="qGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="1536" height="1024" fill="url(#bg)"/>
  <circle cx="768" cy="460" r="200" fill="url(#unknown)"/>

  <!-- 大问号 -->
  <text x="740" y="520" text-anchor="middle" font-family="'Georgia', serif" font-size="300" fill="url(#qGrad)" filter="url(#glow)" opacity="0.8">?</text>

  <!-- 外部光晕环 -->
  <circle cx="768" cy="460" r="160" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.15"/>
  <circle cx="768" cy="460" r="180" fill="none" stroke="#f59e0b" stroke-width="0.3" opacity="0.1"/>

  <text x="768" y="900" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="36" fill="#94a3b8" letter-spacing="4">"理解"是什么意思</text>
  <text x="768" y="940" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="18" fill="#475569" letter-spacing="6">第 一 章</text>
</svg>
