<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-label="香农的刀">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="40%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="bladeGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="bladeGlowFilter">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="1536" height="1024" fill="url(#bg)"/>
  <circle cx="768" cy="380" r="180" fill="url(#bladeGlow)"/>

  <!-- 香农的刀 —— 隐喻为一把聚焦的光束/刀 -->
  <line x1="340" y1="180" x2="1100" y2="400" stroke="#d97706" stroke-width="0.5" opacity="0.2"/>
  <line x1="340" y1="180" x2="1100" y2="420" stroke="#d97706" stroke-width="0.5" opacity="0.15"/>
  <line x1="340" y1="180" x2="1100" y2="380" stroke="#d97706" stroke-width="0.5" opacity="0.15"/>

  <!-- 刀体 -->
  <path d="M340 180 L1100 400 L1100 400 L340 200 Z" fill="url(#blade)" opacity="0.6" filter="url(#bladeGlowFilter)"/>
  <path d="M340 180 L1100 400" stroke="#f59e0b" stroke-width="2" filter="url(#bladeGlowFilter)"/>

  <!-- 刀锋光晕 -->
  <circle cx="340" cy="190" r="12" fill="#fef3c7" opacity="0.8" filter="url(#bladeGlowFilter)"/>

  <!-- 刀刃切开的"噪声"纹理 -->
  <line x1="700" y1="280" x2="720" y2="300" stroke="#475569" stroke-width="1" opacity="0.4"/>
  <line x1="810" y1="310" x2="830" y2="335" stroke="#475569" stroke-width="1" opacity="0.3"/>
  <line x1="920" y1="340" x2="940" y2="365" stroke="#475569" stroke-width="1" opacity="0.25"/>

  <text x="768" y="900" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="36" fill="#94a3b8" letter-spacing="4">香农给我们的刀</text>
  <text x="768" y="940" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="18" fill="#475569" letter-spacing="6">第 二 章 · 通 信 的 数 学 理 论</text>
</svg>
