<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-label="老师调学习率">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="teachGlow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="connGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1536" height="1024" fill="url(#bg)"/>
  <circle cx="768" cy="380" r="200" fill="url(#teachGlow)"/>

  <!-- 两个大脑轮廓——师生对齐 -->
  <!-- 老师 -->
  <circle cx="550" cy="400" r="60" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <g fill="#f59e0b" opacity="0.5">
    <circle cx="530" cy="390" r="3"/>
    <circle cx="555" cy="385" r="3"/>
    <circle cx="545" cy="405" r="2"/>
    <circle cx="560" cy="400" r="2"/>
    <circle cx="540" cy="415" r="2"/>
  </g>
  <text x="550" y="485" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="16" fill="#f59e0b" opacity="0.6">老师</text>

  <!-- 学生 -->
  <circle cx="986" cy="400" r="60" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
  <g fill="#06b6d4" opacity="0.4">
    <circle cx="970" cy="395" r="2"/>
    <circle cx="990" cy="388" r="2"/>
    <circle cx="980" cy="410" r="2"/>
    <circle cx="1000" cy="405" r="2"/>
  </g>
  <text x="986" y="485" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="16" fill="#06b6d4" opacity="0.6">学生</text>

  <!-- 对齐连接 -->
  <path d="M610 390 C700 370, 860 370, 926 390" stroke="url(#connGrad)" stroke-width="1.5" fill="none" filter="url(#glow)"/>
  <path d="M610 410 C700 430, 860 430, 926 410" stroke="url(#connGrad)" stroke-width="1" opacity="0.4" fill="none"/>

  <!-- 比喻作为桥梁 -->
  <text x="768" y="350" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="14" fill="#f59e0b" opacity="0.4">比喻：利用已有结构传输新结构</text>

  <!-- 学习率滑条 -->
  <rect x="620" y="580" width="296" height="8" rx="4" fill="#475569"/>
  <circle cx="720" cy="584" r="8" fill="#f59e0b" filter="url(#glow)"/>
  <text x="720" y="615" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="14" fill="#f59e0b" opacity="0.5">学习率</text>

  <text x="768" y="900" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="36" fill="#94a3b8" letter-spacing="4">老师调学习率</text>
  <text x="768" y="940" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="18" fill="#475569" letter-spacing="6">第 十 一 章 · 教 育</text>
</svg>
