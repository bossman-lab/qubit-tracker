<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-label="大脑不是存档机">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="brainGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1536" height="1024" fill="url(#bg)"/>

  <circle cx="768" cy="450" r="200" fill="url(#brainGlow)"/>

  <!-- 大脑轮廓（简化抽象） -->
  <path d="M560 400 C540 310, 620 250, 720 280 C760 290, 780 280, 820 270 C900 250, 970 310, 950 410 C940 460, 960 500, 940 550 C920 600, 880 620, 840 600 C780 580, 720 580, 660 600 C620 620, 590 600, 575 560 C560 520, 560 480, 560 400 Z" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>

  <!-- 脑内连接网络 -->
  <g stroke="#f59e0b" stroke-width="0.5" opacity="0.25">
    <line x1="640" y1="360" x2="720" y2="400"/>
    <line x1="720" y1="400" x2="700" y2="480"/>
    <line x1="700" y1="480" x2="850" y2="460"/>
    <line x1="850" y1="460" x2="880" y2="380"/>
    <line x1="880" y1="380" x2="800" y2="340"/>
    <line x1="800" y1="340" x2="640" y2="360"/>
    <line x1="700" y1="480" x2="780" y2="520"/>
    <line x1="780" y1="520" x2="850" y2="460"/>
  </g>

  <!-- 量化光点 -->
  <circle cx="640" cy="360" r="4" fill="#f59e0b" opacity="0.4"/>
  <circle cx="720" cy="400" r="5" fill="#f59e0b" opacity="0.5"/>
  <circle cx="700" cy="480" r="4" fill="#f59e0b" opacity="0.3"/>
  <circle cx="850" cy="460" r="5" fill="#06b6d4" opacity="0.4"/>
  <circle cx="880" cy="380" r="4" fill="#06b6d4" opacity="0.3"/>
  <circle cx="800" cy="340" r="3" fill="#f59e0b" opacity="0.4"/>
  <circle cx="780" cy="520" r="3" fill="#06b6d4" opacity="0.3"/>

  <text x="768" y="900" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="36" fill="#94a3b8" letter-spacing="4">大脑不是存档机</text>
  <text x="768" y="940" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="18" fill="#475569" letter-spacing="6">第 六 章 · 认 知 科 学</text>
</svg>
